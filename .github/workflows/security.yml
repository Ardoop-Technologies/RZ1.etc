# RZ1 Security Enforcement - ethical-ai-my
# Ardoop Technologies | Anuar Razii
# Framework: ONSA 2025 | CPC | RMC (MCMC, eff. 1 Jun 2026)

name: RZ1 Security Enforcement

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:

  security-check:
    name: RZ1 Security Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect committed .env files
        run: |
          echo "=== RZ1: Scanning for committed .env files ==="

          TRACKED=$(git ls-files | grep -E "(^|/)\.env$" || true)

          if [ -z "$TRACKED" ]; then
            echo "PASS: No tracked .env files found"
          else
            echo "WARNING: Tracked .env file found - $TRACKED"

            REAL=$(grep -vE "^\s*(#|$)" $TRACKED 2>/dev/null \
              | grep -E "^[A-Z_]+=.+" \
              | grep -ivE "(example|placeholder|changeme|your_|dummy|test)" \
              || true)

            if [ -n "$REAL" ]; then
              echo "FAIL: Real credentials detected in .env"
              echo "$REAL"
              echo "HITL Action Required: Remove or redact before merge"
              exit 1
            else
              echo "PASS: .env contains template/placeholder values only"
            fi
          fi

      - name: Detect hardcoded secret patterns
        run: |
          echo "=== RZ1: Scanning for hardcoded secrets ==="

          FOUND=0
          for pattern in SECRET_KEY API_KEY PRIVATE_KEY ACCESS_TOKEN CLIENT_SECRET DB_PASSWORD BEARER_TOKEN; do
            MATCHES=$(grep -rn \
              --include="*.py" \
              --include="*.js" \
              --include="*.ts" \
              --include="*.json" \
              --include="*.sh" \
              --exclude-dir=".git" \
              --exclude-dir=".github" \
              "$pattern" . 2>/dev/null \
              | grep -v "process.env" \
              | grep -v "os.environ" \
              | grep -v "getenv" \
              | grep -v "secrets\." \
              || true)

            if [ -n "$MATCHES" ]; then
              echo "WARNING [$pattern] potential hardcoded value:"
              echo "$MATCHES"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 0 ]; then
            echo "PASS: No hardcoded secrets detected"
          else
            echo "FAIL: Potential hardcoded credentials found"
            echo "HITL Action Required: Replace with GitHub Secrets"
            exit 1
          fi

      - name: Check .gitignore policy
        run: |
          echo "=== RZ1: Checking .gitignore policy ==="

          if [ -f ".gitignore" ] && grep -qE "^\.env" .gitignore; then
            echo "PASS: .env is listed in .gitignore"
          else
            echo "WARNING: .env is not in .gitignore"
            echo "Recommendation: Run: echo '.env' >> .gitignore"
          fi

      - name: Security summary
        if: success()
        run: |
          echo "=================================================="
          echo " RZ1 SECURITY ENFORCEMENT - SUMMARY"
          echo "=================================================="
          echo " Repository : $GITHUB_REPOSITORY"
          echo " Commit SHA : ${GITHUB_SHA:0:10}"
          echo " Timestamp  : $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "--------------------------------------------------"
          echo " .env Detection (git-aware) : PASSED"
          echo " Secret Pattern Scan        : PASSED"
          echo " .gitignore Policy          : VERIFIED"
          echo "--------------------------------------------------"
          echo " STATUS    : SECURE"
          echo " Framework : ONSA 2025 | CPC | RMC (MCMC)"
          echo "=================================================="
